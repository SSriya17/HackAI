services:
  # Backend API
  - type: web
    name: ra-match-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./ra_match.db
      - key: CORS_ORIGINS
        value: "*"

  # Frontend (Serving as a Web Service for speed/compatibility)
  - type: web
    name: ra-match-frontend
    runtime: node
    buildCommand: cd Antony/frontend && npm install && npm run build
    startCommand: cd Antony/frontend && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: ra-match-api
          type: web
          property: url
