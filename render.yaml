services:
  # Backend API
  - type: web
    name: ra-match-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./ra_match.db
      - key: NEBULA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*" # You can restrict this to your frontend URL later for better security

  # Frontend Static Site (Antony)
  - type: static_site
    name: ra-match-frontend
    buildCommand: cd Antony/frontend && npm install && npm run build
    publishPath: Antony/frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: ra-match-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
